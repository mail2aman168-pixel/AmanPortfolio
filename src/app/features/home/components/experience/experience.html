<section id="experience" class="experience-section position-relative">
  <div class="container">
    <div class="text-center mb-5" data-aos="fade-up">
      <h6 class="text-glow-cyan fw-bold mb-3 text-uppercase tracking-wider">Timeline</h6>
      <h2 class="display-5 fw-bold mb-4">Professional <span class="gradient-text">Experience</span></h2>
    </div>

    <div class="timeline">
      @for (exp of experiences; track exp.role) {
        <div class="timeline-item" data-aos="fade-up">
          <div class="timeline-dot"></div>
          <div class="timeline-content glass-card p-4">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
              <h4 class="fw-bold mb-0 text-white">{{ exp.role }}</h4>
              <span class="badge bg-slate text-glow-cyan border border-white border-opacity-10 px-3 py-2 rounded-pill">
                {{ exp.duration }}
              </span>
            </div>
            <h6 class="text-muted fw-bold mb-4">{{ exp.company }}</h6>
            <ul class="text-muted small">
              @for (point of exp.points; track point) {
                <li class="mb-2">{{ point }}</li>
              }
            </ul>
          </div>
        </div>
      }
    </div>
  </div>
</section>
