<section id="education" class="education-section position-relative">
  <div class="container">
    <div class="text-center mb-5" data-aos="fade-up">
      <h6 class="text-glow-cyan fw-bold mb-3 text-uppercase tracking-wider">Learning Journey</h6>
      <h2 class="display-5 fw-bold mb-4">Academic <span class="gradient-text">Background</span></h2>
    </div>

    <div class="row g-4 justify-content-center">
      @for (edu of education; track edu.degree) {
        <div class="col-lg-4 col-md-6" data-aos="zoom-in" [attr.data-aos-delay]="edu.delay">
          <div class="glass-card p-4 h-100 text-center">
            <div class="edu-icon mb-3">
              <i class="bi bi-mortarboard text-glow-cyan fs-1"></i>
            </div>
            <h5 class="fw-bold mb-2">{{ edu.degree }}</h5>
            <p class="text-glow-cyan small fw-bold mb-3">{{ edu.year }}</p>
            <h6 class="text-muted small mb-0">{{ edu.institution }}</h6>
          </div>
        </div>
      }
    </div>
  </div>
</section>
